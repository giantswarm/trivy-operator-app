{{- if .Values.scanJobTmpdirFix.enabled }}
# Mitigation for aquasecurity/trivy-operator#2859.
#
# trivy derives its working directory from os.TempDir() as /tmp/trivy-<pid>
# (see trivy pkg/x/os/os.go: initTempDir -> os.MkdirAll, Cleanup -> os.RemoveAll).
# Every scan container in a vulnerabilityreport job shares a single /tmp emptyDir
# and runs trivy via `/bin/sh -c`, so trivy gets the same low PID in each
# container's PID namespace and they all resolve to the SAME /tmp/trivy-<pid>
# path on the shared volume. When one container finishes it removes that
# directory while a sibling is still using it, failing the scan with:
#   unable to create temporary directory: stat /tmp/trivy-<pid>: no such file or directory
#
# Pods with many containers (e.g. CSI driver pods: csi-resizer, csi-provisioner,
# csi-attacher, ...) trigger this reliably. Giving each container its own TMPDIR
# moves trivy's working directory to /tmp/<container>/trivy-<pid>, which is unique
# per container, so no sibling can remove a directory still in use.
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: {{ include "trivy-operator-helpers.name" . }}-scan-job-tmpdir
  labels:
    {{- include "trivy-operator-helpers.labels" . | nindent 4 }}
    application.giantswarm.io/team: {{ index .Chart.Annotations "io.giantswarm.application.team" | quote }}
  annotations:
    policies.kyverno.io/title: "Trivy scan job unique TMPDIR"
    policies.kyverno.io/category: "trivy-operator"
    policies.kyverno.io/severity: "medium"
    policies.kyverno.io/subject: "Pod"
    policies.kyverno.io/description: >-
      Gives each trivy scan-job container its own TMPDIR so concurrent scans in a
      multi-container pod do not race on the shared /tmp/trivy-<pid> working
      directory. See aquasecurity/trivy-operator#2859.
spec:
  # Mutate only at admission on Pod CREATE. Existing pods are short-lived and env
  # vars are immutable on running pods, so background re-processing has no value.
  evaluation:
    admission:
      enabled: true
    background:
      enabled: false
  # Apply to the incoming scan Pod only. Disabling pod-controller autogen keeps
  # Kyverno from copying the rule onto Job/CronJob/Deployment pod templates, which
  # is unnecessary here since the Pod itself is what passes through admission.
  autogen:
    podControllers:
      controllers: []
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    # No namespace restriction so it keeps working if scanJobsInSameNamespace is
    # enabled. node-collector pods carry the same managed-by label and are
    # excluded by the name condition below.
    objectSelector:
      matchLabels:
        app.kubernetes.io/managed-by: trivy-operator
  matchConditions:
    # Restrict to trivy scan jobs only. Scan Pods are created from the scan Job's
    # generateName, which the API server resolves into metadata.name before
    # admission runs; generateName is checked too for robustness.
    - name: scan-vulnerabilityreport-pods-only
      expression: >-
        (has(object.metadata.name) && object.metadata.name.startsWith("scan-vulnerabilityreport-")) ||
        (has(object.metadata.generateName) && object.metadata.generateName.startsWith("scan-vulnerabilityreport-"))
  mutations:
    # For each container, add TMPDIR=/tmp/<container-name>. Using JSONPatch to
    # append to the container's env (creating env when absent) leaves the
    # operator-set env vars untouched. Only CREATE is matched, so TMPDIR cannot be
    # appended more than once.
    - patchType: JSONPatch
      jsonPatch:
        expression: |-
          object.spec.containers.map(c,
            !has(c.env) ?
            JSONPatch{
              op: "add",
              path: "/spec/containers/" + string(object.spec.containers.indexOf(c)) + "/env",
              value: [{"name": "TMPDIR", "value": "/tmp/" + c.name}]
            } :
            JSONPatch{
              op: "add",
              path: "/spec/containers/" + string(object.spec.containers.indexOf(c)) + "/env/-",
              value: {"name": "TMPDIR", "value": "/tmp/" + c.name}
            }
          )
{{- end }}
