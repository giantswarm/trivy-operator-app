apiVersion: vendir.k14s.io/v1alpha1
kind: Config
directories:
- path: helm/trivy-operator/charts/trivy-operator
  contents:
  - path: .
    git:
      url: https://github.com/aquasecurity/trivy-operator
      # renovate: datasource=github-tags depName=aquasecurity/trivy-operator
      ref: v0.28.0
    includePaths:
      - deploy/helm/**/*
    excludePaths:
      - deploy/helm/crds/*
    newRootPath: deploy/helm
- path: helm/trivy-operator/crds
  contents:
  - path: .
    git:
      url: https://github.com/aquasecurity/trivy-operator
      ref: v0.28.0
    includePaths:
      - deploy/helm/crds/*
    newRootPath: deploy/helm/crds
